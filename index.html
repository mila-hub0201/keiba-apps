<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0ea5e9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)">
  <meta name="description" content="JRA出馬表PDFから採点・印付け・単勝保証配分の買い目までを一気通貫で行うオフライン対応ツール">
  <title>ウマフル — 出馬表一気通貫分析</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1><img class="logo-mark" src="icons/icon-192.png" alt="" width="38" height="38">ウマフル</h1>
    <p class="tagline">出馬表PDF → 採点 → 印 → 単勝保証配分</p>
  </header>

  <main>
    <!-- PDF読み込み -->
    <section class="card" id="upload-card">
      <div class="dropzone" id="dropzone" role="button" tabindex="0"
           aria-label="出馬表PDFを選択">
        <div class="dropzone-icon"><img src="icons/icon-192.png" alt="" width="76" height="76"></div>
        <p class="dropzone-main">出馬表PDFをここにドロップ<br>またはタップして選択</p>
        <p class="dropzone-sub">JRA形式の出馬表・馬柱PDF(1レース1ファイル)</p>
        <input type="file" id="file-input" accept="application/pdf,.pdf" hidden>
      </div>
      <div class="upload-actions">
        <button class="btn btn-ghost" id="demo-btn" type="button">デモデータで試す</button>
      </div>
      <p class="error" id="error-box" hidden></p>
    </section>

    <!-- レース情報 -->
    <section class="card" id="race-card" hidden>
      <div class="race-line" id="race-line"></div>
    </section>

    <!-- 採点表 -->
    <section class="card" id="score-card" hidden>
      <h2>採点表</h2>
      <p class="hint">オッズ欄は編集できます(当日オッズに直すと買い目も再計算)。
        「パドック」列は当日の気配が良い馬をタップで ◎〇▲△ 指定。</p>
      <div class="table-wrap">
        <table id="score-table" class="dense"></table>
      </div>
      <p class="rank-line" id="rank-line"></p>
    </section>

    <!-- 印・自信度 -->
    <section class="card" id="mark-card" hidden>
      <h2>印・自信度</h2>
      <div id="mark-list" class="mark-list"></div>
      <div class="confidence-row">
        <span class="conf-badge" id="conf-badge"></span>
        <span id="conf-reason"></span>
      </div>
      <details class="comments" id="horse-comments-box">
        <summary>各馬コメント</summary>
        <ul id="horse-comments"></ul>
      </details>
    </section>

    <!-- 買い目設定 -->
    <section class="card" id="bet-settings-card" hidden>
      <h2>買い目設定</h2>
      <div class="settings-grid">
        <label>投資上限
          <span class="input-unit"><input type="number" id="max-total" value="3000" min="200" step="100" inputmode="numeric">円</span>
        </label>
        <label>合成オッズ下限
          <span class="input-unit"><input type="number" id="min-composite" value="1.10" min="1.01" step="0.05" inputmode="decimal">倍</span>
        </label>
      </div>
    </section>

    <!-- 買い目 -->
    <section class="card" id="bet-card" hidden>
      <h2>買い目(単勝・保証配分)</h2>
      <div id="bet-body"></div>
    </section>

    <div class="actions" id="result-actions" hidden>
      <button class="btn btn-primary" id="copy-btn" type="button">結果をテキストでコピー</button>
      <button class="btn btn-ghost" id="reset-btn" type="button">別のレースを読み込む</button>
    </div>
  </main>

  <footer class="app-footer">
    <img class="footer-mark" src="icons/icon-192.png" alt="">
    <p>計算はすべて端末内で完結します(通信・課金なし)。的中を保証するものではありません。
      馬券の購入は自己責任で、20歳以上の方のみ行ってください。</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
